<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Control ESP32 Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Importación de iconos Lucide -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --primary: #6366f1;
      --success: #22c55e;
      --danger: #ef4444;
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #f8fafc;
      --text-muted: #94a3b8;
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: center;
    }

    h1 {
      margin-top: 40px;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 500px;
      padding: 20px;
      box-sizing: border-box;
    }

    /* --- LOGIN FORM --- */
    #loginForm {
      background: var(--card-bg);
      padding: 40px 30px;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      margin-top: 50px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    input {
      width: 100%;
      padding: 14px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
    }

    #loginBtn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, background 0.3s;
    }

    #loginBtn:hover {
      background: #4f46e5;
      transform: translateY(-2px);
    }

    /* --- DASHBOARD --- */
    #dashboard {
      display: none;
      width: 100%;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .remote-layout {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 20px;
      margin: 40px auto;
      width: 280px;
      height: 280px;
    }

    /* Posicionamiento de las flechas */
    .arrow-btn {
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 20px;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      user-select: none;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
    }

    .arrow-btn span {
      font-size: 0.7rem;
      margin-top: 5px;
      text-transform: uppercase;
      font-weight: bold;
    }

    /* Estados Activos (ON) */
    .arrow-btn.active {
      color: white;
      background: var(--primary);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.6);
      transform: scale(1.05);
      border-color: rgba(255,255,255,0.2);
    }

    /* Grid positions */
    #btn1 { grid-column: 2; grid-row: 1; } /* Arriba */
    #btn2 { grid-column: 2; grid-row: 3; } /* Abajo */
    #btn3 { grid-column: 3; grid-row: 2; } /* Derecha */
    #btn4 { grid-column: 1; grid-row: 2; } /* Izquierda (Relay 4) */

    .center-status {
      grid-column: 2;
      grid-row: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.03);
      border-radius: 50%;
      border: 1px dashed rgba(255,255,255,0.1);
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 30px;
    }

    .btn-secondary {
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    #allOffBtn {
      background: var(--danger);
      color: white;
    }

    #logoutBtn {
      background: #334155;
      color: white;
    }

    #allOffBtn:hover, #logoutBtn:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }

    footer {
      margin-top: auto;
      padding: 30px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* Mensajes personalizados */
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #334155;
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 0.9rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 1000;
    }

    @media (max-width: 400px) {
      .remote-layout {
        width: 240px;
        height: 240px;
        gap: 15px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Smart Control</h1>

    <!-- Login -->
    <div id="loginForm">
      <div class="input-group">
        <label>Correo Electrónico</label>
        <input type="email" id="email" placeholder="ejemplo@correo.com" required />
      </div>
      <div class="input-group">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>
      <button id="loginBtn">Entrar al Sistema</button>
    </div>

    <!-- Dashboard -->
    <div id="dashboard">
      <div class="remote-layout">
        <!-- Relay 1: Arriba -->
        <div class="arrow-btn" id="btn1">
          <i data-lucide="chevron-up" size="32"></i>
          <span>R1</span>
        </div>

        <!-- Relay 4: Izquierda -->
        <div class="arrow-btn" id="btn4">
          <i data-lucide="chevron-left" size="32"></i>
          <span>R4</span>
        </div>

        <!-- Centro decorativo -->
        <div class="center-status">
          <i data-lucide="cpu" class="text-muted" size="24" style="opacity: 0.3"></i>
        </div>

        <!-- Relay 3: Derecha -->
        <div class="arrow-btn" id="btn3">
          <i data-lucide="chevron-right" size="32"></i>
          <span>R3</span>
        </div>

        <!-- Relay 2: Abajo -->
        <div class="arrow-btn" id="btn2">
          <i data-lucide="chevron-down" size="32"></i>
          <span>R2</span>
        </div>
      </div>

      <div class="actions">
        <button id="allOffBtn" class="btn-secondary">Apagar Todo</button>
        <button id="logoutBtn" class="btn-secondary">Cerrar Sesión</button>
      </div>
    </div>
  </div>

  <div id="toast">Mensaje aquí</div>

  <footer>
    Desarrollado por Tech StudyCell &bull; ESP32 Cloud
  </footer>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

  <script>
    // Inicializar iconos
    lucide.createIcons();

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyBFiiTaoxS2RtgaxPFUw1-StFqHxiUEO8g",
      authDomain: "esp32firebase-da1a6.firebaseapp.com",
      databaseURL: "https://esp32firebase-da1a6-default-rtdb.firebaseio.com",
      projectId: "esp32firebase-da1a6",
      storageBucket: "esp32firebase-da1a6.firebasestorage.app",
      messagingSenderId: "234121006092",
      appId: "1:234121006092:web:9a876c595cbac68d317229",
      measurementId: "G-9XJEP2SPHP"
    };

    firebase.initializeApp(firebaseConfig);

    const allowedEmail = "victor.adorno@gmail.com";
    const allowedPassword = "12345678";

    const loginForm = document.getElementById("loginForm");
    const dashboard = document.getElementById("dashboard");
    const loginBtn = document.getElementById("loginBtn");
    const toast = document.getElementById("toast");

    function showToast(msg) {
      toast.innerText = msg;
      toast.style.opacity = "1";
      setTimeout(() => { toast.style.opacity = "0"; }, 3000);
    }

    loginBtn.addEventListener("click", () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        showToast("Por favor complete los campos");
        return;
      }

      if(email === allowedEmail && password === allowedPassword){
        firebase.auth().signInWithEmailAndPassword(email, password)
          .then(() => {
            loginForm.style.display = "none";
            dashboard.style.display = "block";
            startRelayControl();
          })
          .catch(error => {
            showToast("Error Firebase: " + error.message);
          });
      } else {
        showToast("Credenciales inválidas");
      }
    });

    function startRelayControl() {
      const db = firebase.database();
      const relays = [
        { id: 1, path: "relay1" },
        { id: 2, path: "relay2" },
        { id: 3, path: "relay3" },
        { id: 4, path: "relay4" },
      ];

      relays.forEach(relay => {
        const btnElement = document.getElementById(`btn${relay.id}`);
        const relayRef = db.ref("/" + relay.path);

        // Listener de estado en tiempo real
        relayRef.on("value", (snapshot) => {
          const state = snapshot.val();
          if(state) {
            btnElement.classList.add("active");
          } else {
            btnElement.classList.remove("active");
          }
        });

        // Evento de click para alternar
        btnElement.onclick = () => {
          relayRef.get().then(snap => {
            const currentVal = snap.val();
            relayRef.set(!currentVal);
          });
        };
      });

      document.getElementById("allOffBtn").onclick = () => {
        relays.forEach(relay => {
          db.ref("/" + relay.path).set(false);
        });
        showToast("Todos los relés apagados");
      };
    }

    document.getElementById("logoutBtn").onclick = () => {
      firebase.auth().signOut()
        .then(() => {
          dashboard.style.display = "none";
          loginForm.style.display = "block";
          document.getElementById("email").value = "";
          document.getElementById("password").value = "";
        });
    };
  </script>
</body>
</html>
